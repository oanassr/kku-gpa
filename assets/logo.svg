    <line x1="78" y1="63" x2="72.5" y2="63"/>
  </g>

  <!-- مؤشّر متّجه للأعلى يميناً (توقّع المعدل وارتفاعه) -->
  <polygon points="66,40 48.5,61 51.5,65" fill="#ffffff"/>
  <circle cx="50" cy="63" r="5" fill="#c9a227"/>
  <circle cx="50" cy="63" r="2" fill="#06433f"/>

