<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="شعار حاسبة وتوقّع المعدل">
  <defs>
    <linearGradient id="kkuG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15a597"/>
      <stop offset="1" stop-color="#06433f"/>
    </linearGradient>
  </defs>
  <!-- الشارة -->
  <circle cx="50" cy="50" r="46" fill="url(#kkuG)"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="#c9a227" stroke-width="3"/>

